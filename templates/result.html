<!DOCTYPE html>
<html>
<head>
<title>Result</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h2>Score: {{ score }}%</h2>

<h4>Matched Skills</h4>
<ul>
{% for m in matched %}
<li>{{ m }}</li>
{% endfor %}
</ul>

<h4>Missing Skills</h4>
<ul>
{% for m in missing %}
<li>{{ m }}</li>
{% endfor %}
</ul>

<hr>

<h4>Improved Resume</h4>
<pre>{{ new_resume }}</pre>

<a href="/download?content={{ new_resume }}" class="btn btn-success">
Download PDF
</a>

<hr>

<h4>Interview Questions</h4>
<ul>
{% for q in questions %}
<li>{{ q }}</li>
{% endfor %}
</ul>

</div>

</body>
</html>
