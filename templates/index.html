<!DOCTYPE html>
<html>
<head>
<title>Analyzer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<h4>Welcome, {{ user }}</h4>

<a href="/logout" class="btn btn-danger mb-3">Logout</a>

<div class="card p-4 shadow">

<h3>Resume Analyzer</h3>

<form action="/analyze" method="post" enctype="multipart/form-data">

<input name="role" class="form-control mb-3" placeholder="Job Role" required>

<textarea name="description" class="form-control mb-3" placeholder="Skills (comma separated)" required></textarea>

<input type="file" name="resume" class="form-control mb-3" required>

<button class="btn btn-success w-100">Analyze</button>

</form>

</div>
</div>

</body>
</html>
